<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Calculator 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
            font-family: 'Poppins', sans-serif;
        }

        .calculator {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(255, 105, 180, 0.3);
            padding: 25px;
            width: 340px;
            overflow: hidden;
            border: 8px solid #ff69b4;
        }

        .display {
            background: #fff0f5;
            color: #d63384;
            font-size: 2.8rem;
            text-align: right;
            padding: 25px 20px;
            margin-bottom: 20px;
            border-radius: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 3px solid #ffc1e3;
            overflow: hidden;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .btn {
            border: none;
            border-radius: 50%;
            font-size: 1.6rem;
            height: 72px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: scale(0.9);
        }

        .number, .decimal {
            background: #ffe4f0;
            color: #d63384;
        }

        .operator {
            background: #ff69b4;
            color: white;
        }

        .clear, [data-action="sign"], [data-action="percent"] {
            background: #ffb3d1;
            color: #c71585;
        }

        .equals {
            background: #ff1493;
            color: white;
            border-radius: 40px;
            font-size: 1.8rem;
        }

        .span-two {
            border-radius: 40px;
            grid-column: span 2;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .calculator::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('1.png') center/cover no-repeat;
            opacity: 0.08;
            z-index: -1;
            border-radius: 30px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn clear" data-action="clear">C</button>
            <button class="btn" data-action="sign">+/-</button>
            <button class="btn" data-action="percent">%</button>
            <button class="btn operator" data-action="divide">÷</button>
            
            <button class="btn number" data-value="7">7</button>
            <button class="btn number" data-value="8">8</button>
            <button class="btn number" data-value="9">9</button>
            <button class="btn operator" data-action="multiply">×</button>
            
            <button class="btn number" data-value="4">4</button>
            <button class="btn number" data-value="5">5</button>
            <button class="btn number" data-value="6">6</button>
            <button class="btn operator" data-action="subtract">-</button>
            
            <button class="btn number" data-value="1">1</button>
            <button class="btn number" data-value="2">2</button>
            <button class="btn number" data-value="3">3</button>
            <button class="btn operator" data-action="add">+</button>
            
            <button class="btn number span-two" data-value="0">0</button>
            <button class="btn" data-action="decimal">.</button>
            <button class="btn equals" data-action="calculate">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetDisplay = false;

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function handleNumber(number) {
            if (shouldResetDisplay) {
                currentInput = number;
                shouldResetDisplay = false;
            } else {
                currentInput = currentInput === '0' ? number : currentInput + number;
            }
            updateDisplay();
        }

        function handleDecimal() {
            if (shouldResetDisplay) {
                currentInput = '0.';
                shouldResetDisplay = false;
            } else if (!currentInput.includes('.')) {
                currentInput += '.';
            }
            updateDisplay();
        }

        function handleOperator(nextOperator) {
            if (operator && shouldResetDisplay) {
                operator = nextOperator;
                return;
            }
            
            if (previousInput === '') {
                previousInput = currentInput;
            } else if (operator) {
                const result = calculate(previousInput, currentInput, operator);
                currentInput = String(result);
                previousInput = currentInput;
            }
            
            shouldResetDisplay = true;
            operator = nextOperator;
            updateDisplay();
        }

        function calculate(first, second, op) {
            first = parseFloat(first);
            second = parseFloat(second);
            
            switch (op) {
                case 'add': return first + second;
                case 'subtract': return first - second;
                case 'multiply': return first * second;
                case 'divide': return second === 0 ? 'Error' : first / second;
                default: return second;
            }
        }

        function handleEquals() {
            if (operator === null) return;
            let result = calculate(previousInput, currentInput, operator);
            currentInput = String(result);
            operator = null;
            previousInput = '';
            shouldResetDisplay = true;
            updateDisplay();
        }

        function clear() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            shouldResetDisplay = false;
            updateDisplay();
        }

        function handleSign() {
            if (currentInput === '0' || currentInput === 'Error') return;
            currentInput = String(parseFloat(currentInput) * -1);
            updateDisplay();
        }

        function handlePercent() {
            if (currentInput === '0' || currentInput === 'Error') return;
            currentInput = String(parseFloat(currentInput) / 100);
            updateDisplay();
        }

        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', () => {
                const value = button.dataset.value;
                const action = button.dataset.action;
                
                if (value) handleNumber(value);
                else if (action) {
                    switch (action) {
                        case 'clear': clear(); break;
                        case 'sign': handleSign(); break;
                        case 'percent': handlePercent(); break;
                        case 'divide': handleOperator('divide'); break;
                        case 'multiply': handleOperator('multiply'); break;
                        case 'subtract': handleOperator('subtract'); break;
                        case 'add': handleOperator('add'); break;
                        case 'decimal': handleDecimal(); break;
                        case 'calculate': handleEquals(); break;
                    }
                }
            });
        });

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') handleNumber(e.key);
            else if (e.key === '.') handleDecimal();
            else if (e.key === '+') handleOperator('add');
            else if (e.key === '-') handleOperator('subtract');
            else if (e.key === '*') handleOperator('multiply');
            else if (e.key === '/') handleOperator('divide');
            else if (e.key === 'Enter' || e.key === '=') handleEquals();
            else if (e.key === 'Backspace') {
                currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0';
                updateDisplay();
            }
            else if (e.key === 'Escape') clear();
        });

        updateDisplay();
    </script>
</body>
</html>
